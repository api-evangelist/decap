apis:
- aid: decap:decap-cms-api
  name: Decap CMS Git Backend API
  description: 'Decap CMS communicates with Git hosting providers (GitHub, GitLab,
    Bitbucket, Azure, Gitea) through their REST and GraphQL APIs to read, create,
    update, and delete content entries, manage media file uploads, and orchestrate
    editorial workflows. The Decap client library wraps these provider APIs; there
    is no standalone Decap REST API server — all operations pass through the configured
    backend. Decap Turbo augments this with a database proxy that caches content and
    reduces direct Git API round-trips for improved performance and reduced rate-limit
    exposure.

    '
