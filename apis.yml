aid: decap
name: Decap CMS
description: 'Decap CMS (formerly Netlify CMS) is an open-source, Git-based headless
  content management system for static site generators and modern frontend frameworks.
  It provides a web-based editorial UI for managing content stored directly in Git
  repositories, supporting collections of entries and media files, rich-text editing,
  editorial workflows (draft/review/publish), and i18n. Content operations are proxied
  to Git hosting backends (GitHub, GitLab, Bitbucket, Azure, Gitea) via their respective
  REST and GraphQL APIs. Decap Turbo adds a managed cloud layer with a database proxy,
  centralized authentication, user roles, real-time collaboration presence, and priority
  support.

  '
